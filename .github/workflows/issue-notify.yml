name: Notify code owners on new issues

on:
  issues:
    types: [opened, labeled]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/CODEOWNERS
          sparse-checkout-cone-mode: false
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Map issue labels to the CODEOWNERS path that defines their owners.
            const labelToPath = {
              'a365': '/src/a365/',
              'langchain': '/src/genai/instrumentations/langchain/',
              'agent-framework': '/src/a365/',
            };

            // Parse .github/CODEOWNERS into [{ pattern, owners }] (skip blanks/comments).
            const codeownersText = fs.readFileSync('.github/CODEOWNERS', 'utf8');
            const rules = codeownersText
              .split('\n')
              .map(l => l.trim())
              .filter(l => l && !l.startsWith('#'))
              .map(l => {
                const [pattern, ...owners] = l.split(/\s+/);
                return { pattern, owners: owners.map(o => o.replace(/^@/, '')) };
              });

            const defaultRule = rules.find(r => r.pattern === '*');
            const defaultOwners = defaultRule ? defaultRule.owners : [];

            const labels = context.payload.issue.labels.map(l => l.name.toLowerCase());
            const mentions = new Set(defaultOwners);

            // Only add label-specific owners for matching labels
            let hasMatchingLabel = false;
            for (const [label, path] of Object.entries(labelToPath)) {
              if (!labels.includes(label)) continue;
              hasMatchingLabel = true;
              const rule = rules.find(r => r.pattern === path);
              if (rule) rule.owners.forEach(o => mentions.add(o));
            }

            // Skip commenting if no recognized labels and this is a label event
            if (!hasMatchingLabel && context.payload.action === 'labeled') return;

            // Check for an existing notification comment to avoid duplicates
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(
              c => c.user.login === 'github-actions[bot]' && c.body.startsWith('cc ')
            );
            if (botComment) {
              // Update existing comment if new owners were added
              const mentionList = [...mentions].map(u => `@${u}`).join(' ');
              if (botComment.body !== `cc ${mentionList}`) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: `cc ${mentionList}`,
                });
              }
              return;
            }

            // Ping owners via a comment so they get a GitHub notification email
            const mentionList = [...mentions].map(u => `@${u}`).join(' ');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `cc ${mentionList}`,
            });
