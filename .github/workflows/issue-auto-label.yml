name: Auto-label issues by component

on:
  issues:
    types: [opened]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Issue forms render dropdown values as:
            //   ### Component\n\n<value>\n
            const match = body.match(/### Component\s*\n\n(.+)/);
            if (!match) {
              console.log('No Component field found in issue body — skipping.');
              return;
            }

            const component = match[1].trim().toLowerCase();

            // Only apply labels for known components (skip "general")
            const knownLabels = ['a365', 'langchain', 'azure-monitor', 'distro', 'agent-framework'];
            if (!knownLabels.includes(component)) {
              console.log(`Component "${component}" does not map to a label — skipping.`);
              return;
            }

            console.log(`Adding label "${component}" to issue #${context.issue.number}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [component],
            });
