name: SDK Lint Auto-Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to run lint fix on
        required: true
        type: string

jobs:
  fix-lint:
    runs-on: ubuntu-latest
    # One run per PR at a time; queued runs wait rather than being cancelled.
    concurrency:
      group: lint-auto-fix-${{ github.event.inputs.pr_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
      issues: write
    steps:
      - name: Fetch and validate PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumberStr = context.payload.inputs?.pr_number;
            if (!prNumberStr) {
              core.warning('No pr_number input provided');
              core.setOutput('has-pr', 'false');
              return;
            }
            const prNumber = Number.parseInt(prNumberStr, 10);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.warning(`Invalid pr_number input: ${prNumberStr}`);
              core.setOutput('has-pr', 'false');
              return;
            }
            core.info(`Got PR #${prNumber} from workflow_dispatch input`);
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });
            if (pr.state !== 'open') {
              core.info(`PR #${prNumber} is not open — skipping`);
              core.setOutput('has-pr', 'false');
              core.setOutput('is-fork', 'false');
              return;
            }
            // Security: only auto-fix branches in the base repository.
            // Checking out a fork and running its package.json scripts with a
            // write token would allow an attacker to execute arbitrary code.
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            if (pr.head.repo.full_name !== baseRepo) {
              core.warning(`PR #${prNumber} is from fork ${pr.head.repo.full_name} — skipping auto-fix`);
              core.setOutput('has-pr', 'false');
              core.setOutput('is-fork', 'true');
              return;
            }
            core.info(`Processing PR #${pr.number} on branch ${pr.head.ref}`);
            core.setOutput('has-pr', 'true');
            core.setOutput('is-fork', 'false');
            core.setOutput('pr-branch', pr.head.ref);
            core.setOutput('pr-repo', pr.head.repo.full_name);

      - name: Notify fork PR author
        if: steps.find-pr.outputs.is-fork == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: Number.parseInt(context.payload.inputs.pr_number, 10),
              body: [
                '⚠️ **Lint auto-fix skipped for fork PR.**',
                '',
                'The auto-fix workflow does not run on pull requests from forks to avoid',
                'executing untrusted code with repository write access.',
                '',
                'Please run `npm run lint:fix` locally and push the lint fixes to your branch.',
              ].join('\n'),
            });

      - name: Checkout PR branch
        if: steps.find-pr.outputs.has-pr == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-pr.outputs.pr-branch }}
          repository: ${{ steps.find-pr.outputs.pr-repo }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.find-pr.outputs.has-pr == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and run lint:fix
        if: steps.find-pr.outputs.has-pr == 'true'
        run: |
          # --ignore-scripts prevents pre/postinstall lifecycle scripts from running
          # against PR-author code with write credentials in scope.
          npm ci --ignore-scripts
          npm run lint:fix

      - name: Commit and push lint fixes
        if: steps.find-pr.outputs.has-pr == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No lint fixes needed"
            echo "CHANGES=false" >> $GITHUB_OUTPUT
          else
            # GitHub Actions runs bash with `-eo pipefail`, so a `grep` that matches
            # nothing would fail this step. Tolerate empty matches and rely on the
            # `git diff --cached --quiet` check below.
            (git diff --name-only \
              | grep -E '\.(ts|mts|cts|tsx|js|mjs|cjs|jsx|json|md|yaml|yml)$' \
              | grep -v '^package-lock\.json$' \
              | xargs -r git add --) || true

            if git diff --cached --quiet; then
              echo "Lint fixes were detected, but none matched the commit allow-list"
              echo "CHANGES=skipped" >> $GITHUB_OUTPUT
            else
              git commit -m "chore: apply eslint lint fixes"
              git push
              echo "CHANGES=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post result comment
        if: steps.find-pr.outputs.has-pr == 'true'
        uses: actions/github-script@v7
        env:
          CHANGES: ${{ steps.commit.outputs.CHANGES }}
        with:
          script: |
            const prNumber = Number.parseInt(context.payload.inputs.pr_number, 10);

            if (process.env.CHANGES === 'true') {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: '✅ Automatically ran `npm run lint:fix` and pushed the lint fixes. lint should now pass.'
              });
              core.info(`Posted success comment on PR #${prNumber}`);
            } else if (process.env.CHANGES === 'skipped') {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: '⚠️ `npm run lint:fix` produced changes, but they only affected files excluded by the commit allow-list. Please review and commit the fixes manually.'
              });
              core.info(`Posted skipped-files comment on PR #${prNumber}`);
            } else {
              core.info(`No lint fixes were needed for PR #${prNumber}`);
            }